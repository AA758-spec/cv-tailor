<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Tailor AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #0d0d1a; color: #e8e0d0; font-family: 'DM Mono', monospace; }
    .bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, #1a1035 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, #0d1a2e 0%, transparent 50%); pointer-events: none; }
    .container { max-width: 860px; margin: 0 auto; padding: 3rem 1.5rem 5rem; position: relative; z-index: 1; }
    .header { text-align: center; margin-bottom: 3rem; }
    .badge { display: inline-block; background: rgba(200,169,110,0.1); border: 1px solid rgba(200,169,110,0.3); color: #c8a96e; padding: 0.3rem 1rem; border-radius: 2px; font-size: 0.7rem; letter-spacing: 0.2em; margin-bottom: 1.2rem; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem,5vw,3.5rem); font-weight: 600; color: #f0e8d8; margin-bottom: 0.8rem; line-height: 1.1; }
    .subtitle { color: #8a8099; font-size: 0.85rem; line-height: 1.7; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 2rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.7rem; letter-spacing: 0.15em; color: #c8a96e; margin-bottom: 0.6rem; text-transform: uppercase; }
    textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: #e8e0d0; font-family: 'DM Mono', monospace; font-size: 0.82rem; line-height: 1.7; padding: 0.9rem 1rem; resize: vertical; outline: none; }
    textarea:focus { border-color: rgba(200,169,110,0.4); }
    .tone-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .tone-btn { padding: 0.4rem 1.1rem; border: 1px solid rgba(255,255,255,0.12); border-radius: 3px; background: transparent; color: #8a8099; font-size: 0.75rem; cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.2s; }
    .tone-btn.active { border-color: #c8a96e; background: rgba(200,169,110,0.12); color: #c8a96e; }
    .generate-btn { width: 100%; padding: 1rem; border: none; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 0.85rem; letter-spacing: 0.15em; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
    .generate-btn.ready { background: linear-gradient(135deg, #c8a96e 0%, #a07840 100%); color: #0d0d1a; }
    .generate-btn.disabled { background: rgba(255,255,255,0.05); color: #4a4060; cursor: not-allowed; }
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 2rem; padding: 4rem 2rem; }
    .spinner { width: 64px; height: 64px; border-radius: 50%; border: 3px solid #1a1a2e; border-top: 3px solid #c8a96e; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-text { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: #c8a96e; }
    .keywords { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
    .keyword { background: rgba(200,169,110,0.1); border: 1px solid rgba(200,169,110,0.25); color: #c8a96e; padding: 0.25rem 0.75rem; border-radius: 2px; font-size: 0.72rem; }
    .tab-bar { display: flex; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 1.5rem; }
    .tab { padding: 0.6rem 1.5rem; border: none; border-bottom: 2px solid transparent; background: transparent; color: #8a8099; font-family: 'DM Mono', monospace; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: -1px; transition: all 0.2s; }
    .tab.active { border-bottom-color: #c8a96e; color: #c8a96e; }
    .copy-btn { background: transparent; border: 1px solid #c8a96e; color: #c8a96e; padding: 0.4rem 1rem; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 0.75rem; cursor: pointer; letter-spacing: 0.08em; float: right; margin-bottom: 0.75rem; }
    .result-box { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.07); border-radius: 6px; padding: 1.5rem; white-space: pre-wrap; font-size: 0.82rem; line-height: 1.8; color: #cec5b5; max-height: 480px; overflow-y: auto; clear: both; }
    .reset-btn { display: block; margin: 1rem auto 0; background: transparent; border: 1px solid rgba(255,255,255,0.15); color: #8a8099; padding: 0.6rem 1.5rem; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 0.75rem; cursor: pointer; }
    .error { background: rgba(180,50,50,0.15); border: 1px solid rgba(180,50,50,0.3); border-radius: 6px; padding: 0.8rem 1rem; margin-bottom: 1rem; color: #f08080; font-size: 0.8rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="container">
    <div class="header">
      <div class="badge">AI-POWERED · FREE TO USE</div>
      <h1>Land the Interview.<br>Every Time.</h1>
      <p class="subtitle">Paste a job description and your CV.<br>Get a tailored CV + cover letter in seconds.</p>
    </div>

    <div id="input-section">
      <div id="error-box" class="error hidden"></div>
      <div class="card">
        <label>Job Description</label>
        <textarea id="job-desc" rows="7" placeholder="Paste the full job posting here — the more detail, the better the match…"></textarea>
      </div>
      <div class="card">
        <label>Your Current CV</label>
        <textarea id="cv-text" rows="8" placeholder="Paste your CV / resume text here — work experience, education, skills…"></textarea>
      </div>
      <div class="card">
        <label>Tone</label>
        <div class="tone-row">
          <button class="tone-btn active" onclick="setTone(this)">professional</button>
          <button class="tone-btn" onclick="setTone(this)">confident</button>
          <button class="tone-btn" onclick="setTone(this)">concise</button>
          <button class="tone-btn" onclick="setTone(this)">enthusiastic</button>
        </div>
      </div>
      <button class="generate-btn disabled" id="gen-btn" onclick="generate()">Paste job description + CV to continue</button>
    </div>

    <div id="generating-section" class="hidden">
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <p class="spinner-text">Crafting your documents…</p>
      </div>
    </div>

    <div id="result-section" class="hidden">
      <div class="card">
        <div id="keywords" class="keywords"></div>
        <div class="tab-bar">
          <button class="tab active" onclick="switchTab('cv')">Tailored CV</button>
          <button class="tab" onclick="switchTab('cover')">Cover Letter</button>
        </div>
        <button class="copy-btn" onclick="copyResult()">COPY</button>
        <div class="result-box" id="result-text"></div>
      </div>
      <button class="reset-btn" onclick="reset()">← Start Over</button>
    </div>
  </div>

  <script>
    let tone = 'professional';
    let resultData = null;
    let activeTab = 'cv';

    document.getElementById('job-desc').addEventListener('input', checkReady);
    document.getElementById('cv-text').addEventListener('input', checkReady);

    function checkReady() {
      const jd = document.getElementById('job-desc').value.trim();
      const cv = document.getElementById('cv-text').value.trim();
      const btn = document.getElementById('gen-btn');
      if (jd.length > 50 && cv.length > 50) {
        btn.className = 'generate-btn ready';
        btn.textContent = '⚡ Generate My Documents';
      } else {
        btn.className = 'generate-btn disabled';
        btn.textContent = 'Paste job description + CV to continue';
      }
    }

    function setTone(el) {
      document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      tone = el.textContent;
    }

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab')[tab === 'cv' ? 0 : 1].classList.add('active');
      document.getElementById('result-text').textContent = tab === 'cv' ? resultData.tailored_cv : resultData.cover_letter;
    }

    function copyResult() {
      const text = activeTab === 'cv' ? resultData.tailored_cv : resultData.cover_letter;
      navigator.clipboard.writeText(text);
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'COPIED ✓';
      setTimeout(() => btn.textContent = 'COPY', 2000);
    }

    async function generate() {
      const jd = document.getElementById('job-desc').value.trim();
      const cv = document.getElementById('cv-text').value.trim();
      if (jd.length < 50 || cv.length < 50) return;

      document.getElementById('input-section').classList.add('hidden');
      document.getElementById('generating-section').classList.remove('hidden');
      document.getElementById('error-box').classList.add('hidden');

      const prompt = `You are an expert career coach and CV writer. A job seeker needs their CV tailored and a cover letter written.

JOB DESCRIPTION:
${jd}

CANDIDATE'S CURRENT CV:
${cv}

REQUESTED TONE: ${tone}

Your task:
1. Rewrite the CV bullet points to strongly align with the job description — use relevant keywords, quantify achievements where possible, mirror the language used in the job posting.
2. Write a compelling cover letter (3–4 paragraphs) that connects the candidate's experience to this specific role.

Respond ONLY with a valid JSON object (no markdown, no backticks), exactly like this:
{"tailored_cv":"Full rewritten CV text here","cover_letter":"Full cover letter text here","key_matches":["keyword1","keyword2","keyword3","keyword4","keyword5"]}`;

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const data = await response.json();
        const raw = data.content?.find(b => b.type === 'text')?.text || '';
        const clean = raw.replace(/```json|```/g, '').trim();
        resultData = JSON.parse(clean);

        const kw = document.getElementById('keywords');
        kw.innerHTML = (resultData.key_matches || []).map(k => `<span class="keyword">✓ ${k}</span>`).join('');
        document.getElementById('result-text').textContent = resultData.tailored_cv;

        document.getElementById('generating-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
      } catch (e) {
        document.getElementById('generating-section').classList.add('hidden');
        document.getElementById('input-section').classList.remove('hidden');
        const err = document.getElementById('error-box');
        err.textContent = 'Something went wrong. Please try again.';
        err.classList.remove('hidden');
      }
    }

    function reset() {
      document.getElementById('job-desc').value = '';
      document.getElementById('cv-text').value = '';
      document.getElementById('result-section').classList.add('hidden');
      document.getElementById('input-section').classList.remove('hidden');
      checkReady();
    }
  </script>
</body>
</html>
